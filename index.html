<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#ffc0d9;
overflow-x:hidden;
}

/* الصفحة الأولى */

#passwordPage{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#ffc0d9;
}

.box{
background:#ffd3e3;
padding:30px;
border-radius:30px;
width:85%;
max-width:350px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.1);
}

.cake{
font-size:80px;
margin-bottom:15px;
}

.title{
font-size:40px;
color:#d63384;
margin-bottom:20px;
}

.passText{
margin-bottom:10px;
color:#b03060;
font-size:20px;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:30px;
outline:none;
font-size:18px;
text-align:center;
margin-bottom:20px;
}

.openBtn{
background:#ff1493;
color:white;
border:none;
padding:15px 25px;
border-radius:50px;
font-size:20px;
}

/* صفحة الاختيار */

#choicePage{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
background:#ffc0d9;
gap:20px;
}

.choiceBox{
background:white;
padding:35px;
border-radius:25px;
font-size:28px;
color:#b03060;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

.smallBtn{
background:white;
padding:25px;
border-radius:20px;
font-size:25px;
color:#b03060;
border:none;
}

/* الصفحة الرئيسية */

#mainPage{
display:none;
padding:20px;
padding-bottom:120px;
background:#ffc0d9;
}

.card{
background:white;
border-radius:25px;
overflow:hidden;
margin-bottom:35px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
display:block;
}

.card p{
padding:20px;
text-align:center;
font-size:28px;
color:#b03060;
}

/* شريط الموسيقى */

.music{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
width:90%;
background:white;
border-radius:50px;
padding:10px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

audio{
width:100%;
}

</style>
</head>

<body>

<!-- صفحة الباسورد -->

<div id="passwordPage">

<div class="box">

<div class="cake">🎂</div>

<div class="title">
Happy Birthday
</div>

<div class="passText">
password
</div>

<input type="password" id="password">

<button class="openBtn" onclick="checkPassword()">
🔒
</button>

</div>

</div>

<!-- صفحة الاختيار -->

<div id="choicePage">

<button class="choiceBox" onclick="enterSite()">
💖<br><br>
بتحبيه؟
</button>

<button class="smallBtn" id="runBtn">
😒<br><br>
مش بتحبيه؟
</button>

</div>

<!-- الصفحة الرئيسية -->

<div id="mainPage">

<div class="card">

<img src="https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?q=80&w=1000">

<p>
بحبك ❤️
</p>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1000">

<p>
  كل سنة وانتي طيبه ❤️
</p>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1511988617509-a57c8a288659?q=80&w=1000">

<p>
وجودك أجمل حاجة ❤️
</p>

</div>

</div>

<!-- الموسيقى -->

<div class="music">

<audio controls autoplay loop>

<source src="Music1.mp3" type="audio/mpeg">

</audio>

</div>

<script>

function checkPassword(){

let pass =
document.getElementById("password").value;

if(pass=="882008"){

document.getElementById("passwordPage").style.display="none";

document.getElementById("choicePage").style.display="flex";

}else{

alert("Wrong Password");

}
let runBtn = document.getElementById("runBtn");

runBtn.addEventListener("touchstart", moveButton);
runBtn.addEventListener("mouseover", moveButton);

function moveButton(){

let x = Math.random() * (window.innerWidth - 200);

let y = Math.random() * (window.innerHeight - 200);

runBtn.style.position = "absolute";

runBtn.style.left = x + "px";

runBtn.style.top = y + "px";

}
}

function enterSite(){

document.getElementById("choicePage").style.display="none";

document.getElementById("mainPage").style.display="block";

}

</script>

</body>
</html>
